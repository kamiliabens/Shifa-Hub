<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shifa Hub | Community Medicine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Comfortaa:wght@700&display=swap" rel="stylesheet">
    
    <script>
        if (localStorage.getItem('theme') === 'light') {
            document.documentElement.setAttribute('data-theme', 'light');
        } else {
            document.documentElement.setAttribute('data-theme', 'dark');
        }
    </script>
    
    <style>
        :root { 
            --main-pink: #ff8fa3; 
            --soft-pink: #ffd1dc; 
            --bg-cream: #fdfaf7; 
            --status-green: #27ae60;
            --body-bg: linear-gradient(135deg, #fdfaf7 0%, #fff0f3 100%);
            --card-bg: rgba(255, 255, 255, 0.7);
            --text-main: #2d3436;
            --text-secondary: #6b7280;
            --nav-bg: rgba(253, 250, 247, 0.85);
            --input-bg: #ffffff;
        }

        [data-theme="dark"] {
            --body-bg: #1a1a2e;
            --card-bg: rgba(255, 255, 255, 0.05);
            --text-main: #ffffff;
            --text-secondary: #cbd5e1;
            --nav-bg: rgba(26, 26, 46, 0.9);
            --input-bg: #1f2937;
            --bg-cream: #1a1a2e;
        }

        html { scroll-behavior: smooth; }
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: var(--body-bg);
            color: var(--text-main);
            padding-top: 140px; overflow-x: hidden; min-height: 100vh;
            transition: background 0.5s ease;
        }

        /* Adjusted Shifa Logo to match Home Page */
        .shifa-logo { 
            font-family: 'Comfortaa', cursive; 
            font-size: 3.5rem; /* Matched to home scale */
            color: var(--main-pink); 
            font-weight: 700; 
            text-shadow: 0 10px 30px rgba(255, 143, 163, 0.3); 
            letter-spacing: -2px;
        }

        .typing-text::after { content: "|"; animation: blinkCursor 0.7s infinite; color: var(--main-pink); }
        @keyframes blinkCursor { 50% { opacity: 0; } }

        .search-container { transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); border: 2px solid var(--soft-pink); background: var(--input-bg); }
        .search-container:focus-within { transform: scale(1.05); border-color: var(--main-pink); box-shadow: 0 15px 30px rgba(255, 143, 163, 0.2); }

        .stat-card {
            background: var(--card-bg); backdrop-filter: blur(10px);
            border: 2px solid var(--soft-pink); border-radius: 35px; padding: 25px 45px;
            transition: 0.4s ease; min-width: 220px; text-align: center;
        }
        .stat-card:hover { transform: translateY(-8px); background: var(--input-bg); border-color: var(--main-pink); }

        .med-card { 
            flex: 0 0 calc((100% - 40px) / 3); scroll-snap-align: start; 
            background: var(--card-bg); backdrop-filter: blur(12px);
            border: 2px solid var(--soft-pink); border-radius: 40px; padding: 25px; 
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); position: relative;
        }
        .med-card:hover { transform: translateY(-15px); background: var(--input-bg); border-color: var(--main-pink); box-shadow: 0 25px 50px rgba(255, 143, 163, 0.15); }

        .img-container { width: 100%; height: 160px; background: white; border-radius: 30px; margin-bottom: 20px; overflow: hidden; display: flex; align-items: center; justify-content: center; border: 1px solid #fff0f3; }
        .med-img { width: 85%; height: 85%; object-fit: contain; transition: 0.5s; }
        .med-card:hover .med-img { transform: scale(1.1); }

        .qty-badge { position: absolute; top: 20px; right: 20px; background: white; border: 1.5px solid var(--soft-pink); color: var(--main-pink); padding: 5px 14px; border-radius: 15px; font-size: 11px; font-weight: 800; }
        
        .sticky-nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; background: var(--nav-bg); backdrop-filter: blur(20px); padding: 15px 0; border-bottom: 1.5px solid var(--soft-pink); }
        
        .nav-btn { background: var(--input-bg); border: 2.5px solid var(--soft-pink); color: var(--main-pink); width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; position: absolute; top: 50%; transform: translateY(-50%); z-index: 20; transition: 0.3s; cursor: pointer; }
        .nav-btn:hover { background: var(--main-pink); color: white; transform: translateY(-50%) scale(1.1); }
        .btn-prev { left: -25px; } .btn-next { right: -25px; }

        .horizontal-scroll { display: flex; overflow-x: auto; scroll-snap-type: x mandatory; gap: 20px; padding: 25px 5px; scrollbar-width: none; scroll-behavior: smooth; }
        .horizontal-scroll::-webkit-scrollbar { display: none; }
        .hidden-item { display: none !important; }

        .status-badge { color: var(--status-green); font-weight: 800; display: flex; align-items: center; gap: 4px; }

        h2, h3 { color: var(--text-main) !important; }
        .text-gray-500, .text-gray-600 { color: var(--text-secondary) !important; }

        @media (max-width: 1024px) { .med-card { flex: 0 0 calc((100% - 20px) / 2); } }
        @media (max-width: 768px) { .med-card { flex: 0 0 88%; } .nav-btn { display: none; } .shifa-logo { font-size: 3rem; } }
    </style>
</head>
<body>

    <nav class="sticky-nav">
        <div class="max-w-7xl mx-auto px-6 flex flex-col lg:flex-row items-center justify-between gap-4">
            <div class="flex items-center gap-4 w-full max-w-lg">
                <a href="index.html" class="px-4 text-[#ff8fa3] hover:scale-110 transition-all"><i class="fas fa-home text-2xl"></i></a>
                <div class="search-container rounded-2xl px-4 py-2 flex items-center w-full shadow-sm">
                    <select id="wilayaFilter" onchange="filterMedicine()" class="bg-transparent outline-none text-[#ff8fa3] font-bold text-sm border-r-2 border-[#fff0f3] pr-2 mr-3 w-32 cursor-pointer">
                        <option value="">All Wilayas</option>
                        <script>
                            const wilayas = ["Adrar", "Chlef", "Laghouat", "Oum El Bouaghi", "Batna", "Béjaïa", "Biskra", "Béchar", "Blida", "Bouira", "Tamanrasset", "Tébessa", "Tlemcen", "Tiaret", "Tizi Ouzou", "Alger", "Djelfa", "Jijel", "Sétif", "Saïda", "Skikda", "Sidi Bel Abbès", "Annaba", "Guelma", "Constantine", "Médéa", "Mostaganem", "M'Sila", "Mascara", "Ouargla", "Oran", "El Bayadh", "Illizi", "Bordj Bou Arreridj", "Boumerدès", "El Tarf", "Tindouf", "Tissemsilt", "El Oued", "Khenchela", "Souk Ahras", "Tipaza", "Mila", "Aïn Defla", "Naâma", "Aïn Témouchent", "Ghardaïa", "Relizane", "Timimoun", "Bordj Badji Mokhtar", "Ouled Djellal", "Béni Abbès", "In Salah", "In Guezzam", "Touggourt", "Djanet", "El M'Ghair", "El Meniaa"];
                            wilayas.forEach((w, i) => document.write(`<option value="${w}">${(i+1).toString().padStart(2, '0')} - ${w}</option>`));
                        </script>
                    </select>
                    <i class="fas fa-search text-[#ffb1c1] mr-3"></i>
                    <input type="text" id="mainSearch" onkeyup="filterMedicine()" placeholder="Search medicine..." class="outline-none w-full bg-transparent font-medium">
                </div>
            </div>
            <div class="flex gap-2 font-bold text-xs overflow-x-auto pb-1">
                <a href="#antibiotics" class="px-5 py-2 bg-white border-2 border-[#ffd1dc] rounded-full text-[#ff8fa3] hover:bg-[#ff8fa3] hover:text-white transition-all">Antibiotics</a>
                <a href="#vitamins" class="px-5 py-2 bg-white border-2 border-[#ffd1dc] rounded-full text-[#ff8fa3] hover:bg-[#ff8fa3] hover:text-white transition-all">Vitamins</a>
                <a href="#devices" class="px-5 py-2 bg-white border-2 border-[#ffd1dc] rounded-full text-[#ff8fa3] hover:bg-[#ff8fa3] hover:text-white transition-all">Devices</a>
                <a href="#chronic" class="px-5 py-2 bg-white border-2 border-[#ffd1dc] rounded-full text-[#ff8fa3] hover:bg-[#ff8fa3] hover:text-white transition-all">Chronic</a>
                <a href="#painkillers" class="px-5 py-2 bg-white border-2 border-[#ffd1dc] rounded-full text-[#ff8fa3] hover:bg-[#ff8fa3] hover:text-white transition-all">Painkillers</a>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto px-6">
        <header class="mb-6 pt-10 text-center">
            <h1 class="shifa-logo">Shifa Hub</h1> 
            <div class="h-12 mt-4"><p id="typing-container" class="typing-text text-3xl font-bold text-[#ff4d73]"></p></div>
            
            <div class="flex flex-wrap justify-center gap-8 mt-12 mb-16">
                <div class="stat-card"><span class="text-[#ff8fa3] font-black text-4xl counter" data-target="30">0</span><span class="text-[#ff8fa3] font-black text-4xl">+</span><br><span class="text-gray-500 font-bold text-xs">Available Meds</span></div>
                <div class="stat-card"><span class="text-[#ff8fa3] font-black text-4xl counter" data-target="100">0</span><span class="text-[#ff8fa3] font-black text-4xl">+</span><br><span class="text-gray-500 font-bold text-xs">Active Donors</span></div>
                <div class="stat-card"><span class="text-[#ff8fa3] font-black text-4xl counter" data-target="50">0</span><span class="text-[#ff8fa3] font-black text-4xl">+</span><br><span class="text-gray-500 font-bold text-xs">Beneficiaries</span></div>
            </div>
        </header>

        <div id="resultsContainer" class="hidden opacity-0 transition-all duration-500 mb-10 text-left border-l-[6px] border-[#ff8fa3] pl-6 py-3 flex items-center bg-white/40 backdrop-blur-md rounded-r-3xl">
            <h2 class="text-2xl font-extrabold">Results for "<span id="searchTermText" class="text-[#ff8fa3]"></span>"</h2>
            <span class="ml-4 bg-[#ffd1dc] text-[#ff8fa3] px-4 py-1 rounded-full text-xs font-black"><span id="resCount">0</span> Available</span>
        </div>

        <div id="noResults" class="hidden text-center py-20 text-[#ff8fa3] font-bold text-2xl">No match found!</div>
        <div id="sections-container" class="space-y-12 pb-20"></div>
    </div>

    <script src="search.js"></script>
</body>
</html>
