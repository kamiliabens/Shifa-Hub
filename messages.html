<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messages | Shifa Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Comfortaa:wght@700&display=swap" rel="stylesheet">
    
    <script>
        // مزامنة الثيم قبل تحميل الصفحة
        if (localStorage.getItem('theme') === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
        }
    </script>
    
    <style>
        :root {
            --body-bg: linear-gradient(135deg, #fdfaf7 0%, #fff0f3 100%);
            --card-bg: rgba(255, 255, 255, 0.7);
            --text-main: #2d3436;
            --text-secondary: #636e72;
            --border-color: #ffd1dc;
            --chat-hover: #fdf2f4;
            --msg-received: #f3eae0;
            --input-bg: #ffffff;
            --pink-main: #ff8fa3;
        }

        [data-theme="dark"] {
            --body-bg: #1a1a2e;
            --card-bg: rgba(255, 255, 255, 0.05);
            --text-main: #ffffff;
            --text-secondary: #cbd5e1;
            --border-color: rgba(255, 255, 255, 0.1);
            --chat-hover: rgba(255, 255, 255, 0.1);
            --msg-received: rgba(255, 255, 255, 0.1);
            --input-bg: #1f2937;
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: var(--body-bg); 
            height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            transition: all 0.5s ease;
            color: var(--text-main);
        }

        .shifa-logo-small { 
            font-family: 'Comfortaa', cursive; 
            color: var(--pink-main); 
            font-weight: 700;
            font-size: 1.5rem;
        }

        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 2px solid var(--border-color);
            box-shadow: 0 25px 50px -12px rgba(255, 143, 163, 0.15);
        }

        aside { border-right: 1.5px solid var(--border-color); }
        .chat-item { transition: 0.3s; border-bottom: 1px solid var(--border-color); }
        .chat-item:hover { background-color: var(--chat-hover); }
        .chat-item.active { background-color: rgba(255, 143, 163, 0.1); border-right: 4px solid var(--pink-main); }

        .action-icon { transition: 0.3s; color: var(--pink-main); border: 1.5px solid var(--border-color); }
        .action-icon:hover { background-color: var(--pink-main); color: white; transform: scale(1.1); }

        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: var(--pink-main); border-radius: 10px; }

        @keyframes messagePop {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .message-animate { animation: messagePop 0.3s ease-out forwards; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-6xl w-full h-[90vh] glass-card rounded-[40px] flex overflow-hidden">
        
        <aside class="w-full md:w-80 flex flex-col z-10 bg-white/10">
            <div class="p-6 border-b border-[#ffd1dc]/30">
                <div class="flex items-center justify-between mb-6">
                    <h1 class="shifa-logo-small">Shifa Hub</h1>
                    <a href="index.html" class="w-10 h-10 rounded-xl bg-pink-100/10 flex items-center justify-center text-[#ff8fa3] hover:bg-[#ff8fa3] hover:text-white transition-all border border-[#ffd1dc]">
                        <i class="fas fa-arrow-left"></i>
                    </a>
                </div>
                <div class="relative">
                    <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-[#ff8fa3] text-sm"></i>
                    <input type="text" placeholder="Search chats..." class="w-full pl-11 pr-4 py-3 bg-white/20 border border-[#ffd1dc] rounded-2xl text-sm focus:ring-1 focus:ring-[#ff8fa3] outline-none text-inherit font-medium">
                </div>
            </div>
            <div class="flex-1 overflow-y-auto custom-scroll" id="chat-list"></div>
        </aside>

        <main class="flex-1 flex flex-col relative">
            <div class="p-6 border-b border-[#ffd1dc]/30 flex items-center justify-between backdrop-blur-md">
                <div class="flex items-center gap-4">
                    <img id="header-avatar" src="" class="w-12 h-12 rounded-2xl object-cover border-2 border-[#ff8fa3]/30">
                    <div>
                        <h3 id="header-name" class="font-extrabold text-lg">Select Chat</h3>
                        <div class="flex items-center gap-2">
                            <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
                            <p id="header-status" class="text-[10px] font-bold uppercase tracking-widest text-[#ff8fa3]">Active Now</p>
                        </div>
                    </div>
                </div>
                <div class="flex gap-3">
                    <button class="action-icon w-11 h-11 rounded-2xl bg-white/20 flex items-center justify-center"><i class="fas fa-phone"></i></button>
                    <button class="action-icon w-11 h-11 rounded-2xl bg-white/20 flex items-center justify-center"><i class="fas fa-video"></i></button>
                </div>
            </div>

            <div class="flex-1 overflow-y-auto p-8 space-y-6 custom-scroll" id="messages-container"></div>

            <div class="p-6">
                <form id="chat-form" class="flex items-center gap-4 bg-white/30 p-2 rounded-3xl border border-[#ffd1dc] focus-within:border-[#ff8fa3] transition-all backdrop-blur-sm">
                    <button type="button" class="w-10 h-10 text-[#ff8fa3] hover:scale-125 transition-all"><i class="fas fa-plus"></i></button>
                    <input type="text" id="msg-input" placeholder="Write a message..." autocomplete="off" class="flex-1 bg-transparent border-none outline-none text-sm px-2 focus:ring-0 text-inherit font-medium">
                    <button type="submit" class="w-12 h-12 bg-[#ff8fa3] text-white rounded-2xl shadow-lg hover:brightness-110 active:scale-95 transition-all flex items-center justify-center">
                        <i class="fas fa-paper-plane"></i>
                    </button>
                </form>
            </div>
        </main>
    </div>

    <script src="messages.js"></script>
</body>
</html>
