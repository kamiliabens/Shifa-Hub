<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shifa Hub - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* تأثير القلب Card Flip */
        .card-container {
            perspective: 1000px;
        }
        .card-inner {
            transition: transform 0.8s;
            transform-style: preserve-3d;
            position: relative;
        }
        .is-flipped {
            transform: rotateY(180deg);
        }
        .card-face {
            backface-visibility: hidden;
            position: absolute;
            width: 100%;
            height: 100%;
        }
        .card-back {
            transform: rotateY(180deg);
        }
    </style>
</head>
<body class="bg-[#1a1a1a] flex items-center justify-center min-h-screen font-sans">

    <div class="card-container w-[800px] h-[500px]">
        <div id="authCard" class="card-inner w-full h-full shadow-2xl rounded-3xl overflow-hidden">
            
            <div class="card-face card-front bg-white flex">
                <div class="w-3/5 p-12 flex flex-col justify-center">
                    <h2 class="text-3xl font-bold text-gray-800 mb-8 text-center">Sign In</h2>
                    <div class="space-y-4">
                        <input type="email" placeholder="Email Address" class="w-full p-4 bg-gray-100 rounded-xl outline-none focus:ring-2 focus:ring-[#ff8fa3]">
                        <input type="password" placeholder="Password" class="w-full p-4 bg-gray-100 rounded-xl outline-none focus:ring-2 focus:ring-[#ff8fa3]">
                    </div>
                    <p class="text-xs text-gray-400 mt-4 text-center cursor-pointer hover:text-[#ff8fa3]">Forgot your password?</p>
                    <button class="mt-8 w-full py-4 bg-[#ff8fa3] text-white rounded-xl font-bold text-lg hover:bg-[#ff758f] transition">SIGN IN</button>
                </div>
                <div class="w-2/5 bg-[#ff8fa3] flex flex-col items-center justify-center text-white p-8 text-center">
                    <h2 class="text-2xl font-bold mb-4">Hello, Friend!</h2>
                    <p class="mb-8 text-sm">Enter your personal details and start journey with us</p>
                    <button onclick="toggleFlip()" class="px-10 py-2 border-2 border-white rounded-full font-semibold hover:bg-white hover:text-[#ff8fa3] transition">Sign Up</button>
                </div>
            </div>

            <div class="card-face card-back bg-white flex">
                <div class="w-2/5 bg-[#ff8fa3] flex flex-col items-center justify-center text-white p-8 text-center">
                    <h2 class="text-2xl font-bold mb-4">Welcome Back!</h2>
                    <p class="mb-8 text-sm">To keep connected with us please login with your personal info</p>
                    <button onclick="toggleFlip()" class="px-10 py-2 border-2 border-white rounded-full font-semibold hover:bg-white hover:text-[#ff8fa3] transition">Sign In</button>
                </div>
                <div class="w-3/5 p-12 flex flex-col justify-center">
                    <h2 class="text-3xl font-bold text-gray-800 mb-8 text-center">Create Account</h2>
                    <div class="space-y-4">
                        <input type="text" placeholder="Name" class="w-full p-4 bg-gray-100 rounded-xl outline-none focus:ring-2 focus:ring-[#ff8fa3]">
                        <input type="email" placeholder="Email" class="w-full p-4 bg-gray-100 rounded-xl outline-none focus:ring-2 focus:ring-[#ff8fa3]">
                        <input type="password" placeholder="Password" class="w-full p-4 bg-gray-100 rounded-xl outline-none focus:ring-2 focus:ring-[#ff8fa3]">
                    </div>
                    <button class="mt-8 w-full py-4 bg-[#ff8fa3] text-white rounded-xl font-bold text-lg hover:bg-[#ff758f] transition">SIGN UP</button>
                </div>
            </div>

        </div>
    </div>

</body>
</html>
